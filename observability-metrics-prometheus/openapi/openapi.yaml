openapi: 3.0.3
info:
  title: OpenChoreo Prometheus Metrics Adapter API
  version: 1.0.0
  description: |
    Adapter API for receiving Alertmanager webhooks and forwarding them
    to the Observer API in normalized webhook format.

paths:
  /health:
    get:
      operationId: health
      security: []
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/alerting/webhook:
    post:
      operationId: handleAlertmanagerWebhook
      security: []
      summary: Receive Alertmanager webhook payload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertmanagerWebhookPayload"
      responses:
        "200":
          description: Webhook processed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookResponse"
        "400":
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to process webhook
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
      required: [status]

    WebhookResponse:
      type: object
      properties:
        status:
          type: string
          enum: [success, error]
        message:
          type: string
      required: [status, message]

    ErrorResponse:
      type: object
      properties:
        title:
          type: string
        message:
          type: string
      required: [title, message]

    AlertmanagerWebhookPayload:
      type: object
      properties:
        status:
          type: string
        receiver:
          type: string
        alerts:
          type: array
          maxItems: 1
          items:
            $ref: "#/components/schemas/AlertmanagerAlert"
      required: [alerts]

    AlertmanagerAlert:
      type: object
      properties:
        status:
          type: string
        labels:
          type: object
          additionalProperties:
            type: string
        annotations:
          type: object
          properties:
            rule_name:
              type: string
            rule_namespace:
              type: string
            alert_value:
              type: string
          required: [rule_name, rule_namespace, alert_value]
          additionalProperties:
            type: string
        startsAt:
          type: string
          format: date-time
      required: [status, annotations, startsAt]
